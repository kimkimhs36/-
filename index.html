<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TEAMBKIT — Race To Be The Star</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
            --safe-left: env(safe-area-inset-left, 20px);
            --safe-right: env(safe-area-inset-right, 20px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
            background: #0a0014;
        }
        html::-webkit-scrollbar {
            display: none;
        }

        body {
            font-family: 'Inter', 'Space Grotesk', sans-serif;
            background: #0a0014;
            color: #fff;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            cursor: crosshair;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        #three-canvas {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        #grain-overlay {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.22;
            mix-blend-mode: overlay;
            filter: url(#film-grain);
            animation: grain-shift 0.15s steps(3) infinite;
        }
        @keyframes grain-shift {
            0%,
            100% {
                transform: translate(0, 0);
            }
            33% {
                transform: translate(-1px, 1px);
            }
            66% {
                transform: translate(1px, -1px);
            }
        }

        #vignette {
            position: fixed;
            inset: 0;
            z-index: 9;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0, 0, 0, 0.7) 85%, rgba(0, 0, 0, 0.95) 100%);
            mix-blend-mode: multiply;
        }

        #light-leak-1 {
            position: fixed;
            width: 60vw;
            height: 40vh;
            top: -10%;
            right: -15%;
            z-index: 8;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(255, 140, 60, 0.18) 0%, transparent 70%);
            mix-blend-mode: screen;
            animation: leak-drift 12s ease-in-out infinite;
        }
        #light-leak-2 {
            position: fixed;
            width: 50vw;
            height: 35vh;
            bottom: -8%;
            left: -10%;
            z-index: 8;
            pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(180, 60, 255, 0.14) 0%, transparent 70%);
            mix-blend-mode: screen;
            animation: leak-drift 15s ease-in-out infinite reverse;
        }
        @keyframes leak-drift {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            25% {
                transform: translate(3vw, -2vh) scale(1.15);
            }
            50% {
                transform: translate(-1vw, 3vh) scale(0.9);
            }
            75% {
                transform: translate(-2vw, -1vh) scale(1.08);
            }
        }

        #scroll-content {
            position: relative;
            z-index: 20;
            pointer-events: none;
            height: 500vh;
        }

        .chapter {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .chapter-inner {
            pointer-events: auto;
            text-align: center;
            z-index: 21;
        }

        #hero-typo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 22;
            pointer-events: none;
            text-align: center;
            width: 90vw;
            max-width: 1000px;
        }
        #hero-typo .brand-name {
            font-family: 'Cormorant Garamond', 'Instrument Serif', serif;
            font-weight: 700;
            font-size: clamp(4rem, 12vw, 10rem);
            letter-spacing: -0.02em;
            line-height: 0.85;
            color: #fff;
            text-shadow: 0 0 120px rgba(255, 120, 60, 0.5), 0 0 60px rgba(200, 60, 180, 0.4), 0 4px 8px rgba(0, 0, 0, 0.6);
            position: relative;
            display: inline-block;
        }
        #hero-typo .brand-name::before {
            content: attr(data-text);
            position: absolute;
            left: -3px;
            top: 0;
            color: #ff3366;
            mix-blend-mode: screen;
            pointer-events: none;
            opacity: 0.7;
            animation: ca-shift 0.08s steps(2) infinite;
        }
        #hero-typo .brand-name::after {
            content: attr(data-text);
            position: absolute;
            left: 3px;
            top: 0;
            color: #33ccff;
            mix-blend-mode: screen;
            pointer-events: none;
            opacity: 0.7;
            animation: ca-shift 0.08s steps(2) infinite reverse;
        }
        @keyframes ca-shift {
            0%,
            100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(1px, -1px);
            }
        }

        #hero-typo .sub-brand {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-style: italic;
            font-size: clamp(1.2rem, 3.5vw, 2.6rem);
            letter-spacing: 0.08em;
            color: rgba(255, 220, 180, 0.9);
            text-shadow: 0 0 40px rgba(255, 150, 80, 0.5);
            margin-top: -0.2em;
        }
        #hero-typo .tagline {
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            font-weight: 500;
            font-size: clamp(0.7rem, 1.5vw, 1rem);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: rgba(255, 200, 160, 0.8);
            margin-top: 0.5em;
            text-shadow: 0 0 20px rgba(255, 140, 60, 0.4);
        }

        #fixed-ui {
            position: fixed;
            z-index: 30;
            pointer-events: none;
            inset: 0;
        }
        #fixed-ui .top-left {
            position: absolute;
            top: var(--safe-top);
            left: var(--safe-left);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: clamp(0.8rem, 1.6vw, 1.1rem);
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 0 30px rgba(255, 140, 60, 0.5);
            pointer-events: auto;
            cursor: pointer;
        }
        #fixed-ui .bottom-right {
            position: absolute;
            bottom: var(--safe-bottom);
            right: var(--safe-right);
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: clamp(0.65rem, 1.2vw, 0.85rem);
            letter-spacing: 0.15em;
            color: rgba(255, 200, 170, 0.75);
            text-shadow: 0 0 20px rgba(255, 120, 50, 0.4);
            pointer-events: auto;
            cursor: pointer;
            transition: color 0.4s;
        }
        #fixed-ui .bottom-right:hover {
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 160, 80, 0.7);
        }
        #fixed-ui .progress-line {
            position: absolute;
            right: var(--safe-right);
            top: 50%;
            transform: translateY(-50%);
            width: 1px;
            height: 25vh;
            max-height: 180px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            overflow: hidden;
        }
        #fixed-ui .progress-line-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to bottom, #ff9966, #ff3366, #cc33ff);
            border-radius: 2px;
            transition: height 0.1s linear;
            box-shadow: 0 0 12px rgba(255, 100, 50, 0.6);
        }

        #chapter-label {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 40px);
            left: var(--safe-left);
            z-index: 30;
            pointer-events: none;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: clamp(0.6rem, 1vw, 0.75rem);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255, 200, 160, 0.6);
            transition: all 0.5s ease;
        }

        @media (max-width: 768px) {
            #hero-typo .brand-name {
                font-size: clamp(3rem, 16vw, 6rem);
            }
            #hero-typo .sub-brand {
                font-size: clamp(1rem, 5vw, 1.8rem);
            }
            #grain-overlay {
                opacity: 0.15;
            }
            #vignette {
                background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.75) 80%, rgba(0, 0, 0, 0.95) 100%);
            }
            #light-leak-1,
            #light-leak-2 {
                opacity: 0.6;
            }
        }
        @media (max-width: 480px) {
            #hero-typo .brand-name {
                font-size: clamp(2.5rem, 18vw, 5rem);
                letter-spacing: -0.01em;
            }
            #fixed-ui .progress-line {
                height: 15vh;
            }
        }
    </style>
</head>
<body>

    <svg style="position:absolute;width:0;height:0;overflow:hidden;" aria-hidden="true">
        <defs>
            <filter id="film-grain" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="4" stitchTiles="stitch" seed="3" />
                <feColorMatrix type="saturate" values="0" />
                <feBlend in="SourceGraphic" mode="multiply" result="grain" />
                <feComponentTransfer in="grain">
                    <feFuncA type="linear" slope="1.2" />
                </feComponentTransfer>
            </filter>
            <filter id="glow-blur">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
        </defs>
    </svg>

    <canvas id="three-canvas"></canvas>
    <div id="grain-overlay"></div>
    <div id="vignette"></div>
    <div id="light-leak-1"></div>
    <div id="light-leak-2"></div>

    <div id="hero-typo">
        <div class="brand-name" data-text="TEAMBKIT">TEAMBKIT</div>
        <div class="sub-brand">Race To Be The Star</div>
        <div class="tagline">Stock outside. Faster inside.</div>
    </div>

    <div id="chapter-label">HERO</div>

    <div id="fixed-ui">
        <div class="top-left">BKIT</div>
        <div class="bottom-right">@teambkit.official</div>
        <div class="progress-line"><div class="progress-line-fill" id="progress-fill"></div></div>
    </div>

    <div id="scroll-content">
        <div class="chapter" data-chapter="HERO"></div>
        <div class="chapter" data-chapter="SPEED"></div>
        <div class="chapter" data-chapter="MACHINE"></div>
        <div class="chapter" data-chapter="DREAM"></div>
        <div class="chapter" data-chapter="FINAL"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const canvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, powerPreference: 'high-performance' });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#120520');
        scene.fog = new THREE.FogExp2('#ff9966', 0.000018);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 120);
        camera.position.set(0, 1.6, 5.5);
        camera.lookAt(0, 0.35, 0);

        const clock = new THREE.Clock();
        let carModel = null;
        let carGroup = new THREE.Group();
        scene.add(carGroup);

        const mouse = { x: 0, y: 0, tx: 0, ty: 0 };
        let scrollProgress = 0;

        function createRoad() {
            const roadCanvas = document.createElement('canvas');
            roadCanvas.width = 512;
            roadCanvas.height = 1024;
            const ctx = roadCanvas.getContext('2d');
            ctx.fillStyle = '#1a1a1c';
            ctx.fillRect(0, 0, 512, 1024);
            for (let i = 0; i < 8000; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 1024;
                const b = 18 + Math.random() * 22;
                ctx.fillStyle = `rgba(${b},${b},${b + 4},0.5)`;
                ctx.fillRect(x, y, 1 + Math.random() * 2.5, 1 + Math.random() * 2.5);
            }
            for (let i = 0; i < 60; i++) {
                const x = Math.random() * 512;
                const y = Math.random() * 1024;
                ctx.fillStyle = `rgba(35,35,38,0.7)`;
                ctx.fillRect(x, y, 3 + Math.random() * 8, 2 + Math.random() * 4);
            }
            const tex = new THREE.CanvasTexture(roadCanvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(3, 8);
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.anisotropy = 4;

            const roadGeo = new THREE.PlaneGeometry(40, 60, 1, 1);
            const roadMat = new THREE.MeshStandardMaterial({
                map: tex,
                color: '#1c1c1f',
                roughness: 0.88,
                metalness: 0.04,
            });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.y = -0.02;
            road.receiveShadow = true;
            road.renderOrder = 1;
            scene.add(road);

            const roadGlowGeo = new THREE.PlaneGeometry(40, 3);
            const roadGlowMat = new THREE.MeshBasicMaterial({
                color: '#ff9966',
                transparent: true,
                opacity: 0.06,
                side: THREE.DoubleSide,
                depthWrite: false,
            });
            const roadGlow = new THREE.Mesh(roadGlowGeo, roadGlowMat);
            roadGlow.rotation.x = -Math.PI / 2;
            roadGlow.position.y = 0.0;
            roadGlow.position.z = -12;
            roadGlow.renderOrder = 0;
            scene.add(roadGlow);

            return road;
        }
        const road = createRoad();

        function createMountains() {
            const mountainsGroup = new THREE.Group();
            const mountainData = [
                { x: -15, z: -25, h: 8, w: 5, d: 3 },
                { x: -8, z: -28, h: 6.5, w: 4, d: 2.5 },
                { x: -3, z: -30, h: 9, w: 5.5, d: 3.2 },
                { x: 4, z: -27, h: 7, w: 4.5, d: 2.8 },
                { x: 10, z: -29, h: 7.5, w: 5, d: 3 },
                { x: 16, z: -26, h: 5.5, w: 3.5, d: 2.2 },
                { x: -11, z: -32, h: 10, w: 6, d: 3.5 },
                { x: 7, z: -33, h: 8.5, w: 5.5, d: 3.3 },
                { x: -19, z: -24, h: 6, w: 4, d: 2.5 },
                { x: 20, z: -28, h: 4.5, w: 3, d: 2 },
            ];

            mountainData.forEach(data => {
                const shape = new THREE.Shape();
                const w = data.w;
                const h = data.h;
                shape.moveTo(-w, 0);
                shape.quadraticCurveTo(-w * 0.5, h * 0.7, -w * 0.25, h * 0.9);
                shape.quadraticCurveTo(0, h, w * 0.2, h * 0.85);
                shape.quadraticCurveTo(w * 0.6, h * 0.5, w, 0);
                shape.lineTo(-w, 0);

                const extrudeSettings = { steps: 1, depth: data.d, bevelEnabled: true, bevelThickness: 0.5,
                    bevelSize: 0.4, bevelSegments: 8 };
                const geo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
                geo.computeVertexNormals();

                const mat = new THREE.MeshStandardMaterial({
                    color: new THREE.Color('#1a1028').multiplyScalar(0.7 + Math.random() * 0.5),
                    roughness: 0.85,
                    metalness: 0.02,
                    flatShading: false,
                });

                const mountain = new THREE.Mesh(geo, mat);
                mountain.position.set(data.x, -0.05, data.z);
                mountain.rotation.y = (Math.random() - 0.5) * 0.6;
                mountain.castShadow = true;
                mountain.receiveShadow = true;
                mountain.renderOrder = 0;
                mountainsGroup.add(mountain);

                const glowGeo = new THREE.PlaneGeometry(data.w * 1.8, data.h * 0.4);
                const glowMat = new THREE.MeshBasicMaterial({
                    color: '#ff8855',
                    transparent: true,
                    opacity: 0.04 + Math.random() * 0.03,
                    side: THREE.DoubleSide,
                    depthWrite: false,
                });
                const glowPlane = new THREE.Mesh(glowGeo, glowMat);
                glowPlane.position.copy(mountain.position);
                glowPlane.position.y += data.h * 0.5;
                glowPlane.position.z += data.d * 0.5 + 0.5;
                glowPlane.renderOrder = -1;
                mountainsGroup.add(glowPlane);
            });

            scene.add(mountainsGroup);
            return mountainsGroup;
        }
        const mountains = createMountains();

        function createParticles() {
            const count = 400;
            const geo = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            for (let i = 0; i < count; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 30;
                positions[i * 3 + 1] = Math.random() * 15 + 0.2;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 25 - 5;
                sizes[i] = Math.random() * 3 + 0.5;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            const mat = new THREE.PointsMaterial({
                color: '#ffccaa',
                size: 0.04,
                transparent: true,
                opacity: 0.5,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
            });
            const particles = new THREE.Points(geo, mat);
            particles.renderOrder = 5;
            scene.add(particles);
            return particles;
        }
        const particles = createParticles();

        function setupLighting() {
            const ambient = new THREE.AmbientLight('#2a1540', 1.8);
            scene.add(ambient);

            const keyLight = new THREE.DirectionalLight('#ffccaa', 7);
            keyLight.position.set(5, 6, 3);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            keyLight.shadow.camera.near = 0.3;
            keyLight.shadow.camera.far = 40;
            keyLight.shadow.camera.left = -10;
            keyLight.shadow.camera.right = 10;
            keyLight.shadow.camera.top = 10;
            keyLight.shadow.camera.bottom = -2;
            keyLight.shadow.bias = -0.0004;
            keyLight.shadow.normalBias = 0.02;
            keyLight.shadow.radius = 2;
            scene.add(keyLight);

            const rimLight = new THREE.DirectionalLight('#9944ff', 3.5);
            rimLight.position.set(-4, 3, -2);
            rimLight.castShadow = true;
            rimLight.shadow.mapSize.width = 1024;
            rimLight.shadow.mapSize.height = 1024;
            rimLight.shadow.camera.near = 0.3;
            rimLight.shadow.camera.far = 30;
            rimLight.shadow.bias = -0.0003;
            rimLight.shadow.radius = 3;
            scene.add(rimLight);

            const fillLight = new THREE.DirectionalLight('#ff9966', 2);
            fillLight.position.set(0, 2, 6);
            scene.add(fillLight);

            const horizonLight = new THREE.PointLight('#ff7744', 8, 20, 1.5);
            horizonLight.position.set(0, 0.3, -10);
            horizonLight.castShadow = true;
            horizonLight.shadow.mapSize.width = 512;
            horizonLight.shadow.mapSize.height = 512;
            horizonLight.shadow.radius = 4;
            scene.add(horizonLight);

            const topGlow = new THREE.PointLight('#cc55ff', 4, 18, 2);
            topGlow.position.set(0, 7, -5);
            scene.add(topGlow);

            const carSpot = new THREE.SpotLight('#ffffff', 5, 15, Math.PI / 7, 0.3, 1);
            carSpot.position.set(2, 4, 2);
            carSpot.target.position.set(0, 0.4, 0);
            carSpot.castShadow = true;
            carSpot.shadow.mapSize.width = 1024;
            carSpot.shadow.mapSize.height = 1024;
            carSpot.shadow.radius = 2;
            scene.add(carSpot);
            scene.add(carSpot.target);
        }
        setupLighting();

        function loadCar() {
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://threejs.org/examples/jsm/libs/draco/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(dracoLoader);

            loader.load(
                'https://threejs.org/examples/models/gltf/ferrari.glb',
                (gltf) => {
                    carModel = gltf.scene;
                    const box = new THREE.Box3().setFromObject(carModel);
                    const size = box.getSize(new THREE.Vector3());
                    const center = box.getCenter(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const targetWidth = 3.2;
                    const scale = targetWidth / maxDim;
                    carModel.scale.setScalar(scale);

                    const newBox = new THREE.Box3().setFromObject(carModel);
                    const newCenter = newBox.getCenter(new THREE.Vector3());
                    const newMin = newBox.min.clone();

                    carModel.position.set(-newCenter.x, -newMin.y + 0.04, -newCenter.z);
                    carModel.rotation.y = 0.35;

                    carModel.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            if (child.material) {
                                child.material.needsUpdate = true;
                                if (child.material.emissive && child.material.emissiveIntensity !== undefined) {
                                    child.material.emissiveIntensity = Math.min(child.material.emissiveIntensity ||
                                        0, 0.5);
                                }
                            }
                        }
                    });

                    carGroup.add(carModel);
                    console.log('🏎️ Ferrari loaded — ready to race.');
                },
                (progress) => {
                    const pct = Math.round((progress.loaded / progress.total) * 100);
                    if (pct % 25 === 0) console.log(`Loading Ferrari... ${pct}%`);
                },
                (error) => {
                    console.warn('Ferrari model load issue, attempting fallback...', error);
                    loadFallbackCar();
                }
            );
        }

        function loadFallbackCar() {
            const loader = new GLTFLoader();
            loader.load(
                'https://raw.githubusercontent.com/coopercodes/bmwGLB/main/bmw_m4_competition_m_package.glb',
                (gltf) => {
                    carModel = gltf.scene;
                    const box = new THREE.Box3().setFromObject(carModel);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const targetWidth = 3.0;
                    const scale = targetWidth / maxDim;
                    carModel.scale.setScalar(scale);
                    const newBox = new THREE.Box3().setFromObject(carModel);
                    const newMin = newBox.min.clone();
                    const newCenter = newBox.getCenter(new THREE.Vector3());
                    carModel.position.set(-newCenter.x, -newMin.y + 0.04, -newCenter.z);
                    carModel.rotation.y = 0.3;
                    carModel.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    carGroup.add(carModel);
                    console.log('🏎️ BMW M4 fallback loaded.');
                },
                undefined,
                () => console.error('All car models failed to load.')
            );
        }
        loadCar();

        const camProxy = {
            x: 0,
            y: 1.6,
            z: 5.5,
            tx: 0,
            ty: 0.35,
            tz: 0,
            rotY: 0
        };

        const chapterLabels = ['HERO', 'SPEED', 'MACHINE', 'DREAM', 'FINAL'];
        const chapterLabelEl = document.getElementById('chapter-label');
        const heroTypo = document.getElementById('hero-typo');
        const progressFill = document.getElementById('progress-fill');

        function updateCameraFromProxy() {
            camera.position.set(camProxy.x, camProxy.y, camProxy.z);
            camera.lookAt(camProxy.tx, camProxy.ty, camProxy.tz);
        }

        function getChapterCamera(progress) {
            const p = Math.max(0, Math.min(1, progress));
            const chapters = [
                { x: 0, y: 1.5, z: 5.5, tx: 0, ty: 0.35, tz: 0 },
                { x: 3.5, y: 1.1, z: 4.2, tx: 0, ty: 0.3, tz: 0 },
                { x: 1.8, y: 0.7, z: 2.5, tx: 0.1, ty: 0.38, tz: 0 },
                { x: 0, y: 3.5, z: 8, tx: 0, ty: 0.4, tz: -0.5 },
                { x: 0, y: 1.3, z: 4.8, tx: 0, ty: 0.35, tz: 0 },
            ];

            const segmentCount = chapters.length - 1;
            const segFloat = p * segmentCount;
            const segIndex = Math.min(Math.floor(segFloat), segmentCount - 1);
            const t = segFloat - segIndex;

            const a = chapters[segIndex];
            const b = chapters[segIndex + 1];

            const easeT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

            return {
                x: a.x + (b.x - a.x) * easeT,
                y: a.y + (b.y - a.y) * easeT,
                z: a.z + (b.z - a.z) * easeT,
                tx: a.tx + (b.tx - a.tx) * easeT,
                ty: a.ty + (b.ty - a.ty) * easeT,
                tz: a.tz + (b.tz - a.tz) * easeT,
            };
        }

        function onScroll(progress) {
            scrollProgress = progress;
            const cam = getChapterCamera(progress);
            camProxy.x = cam.x;
            camProxy.y = cam.y;
            camProxy.z = cam.z;
            camProxy.tx = cam.tx;
            camProxy.ty = cam.ty;
            camProxy.tz = cam.tz;

            const chapterIndex = Math.min(Math.floor(progress * chapterLabels.length), chapterLabels.length - 1);
            if (chapterLabelEl.textContent !== chapterLabels[chapterIndex]) {
                chapterLabelEl.textContent = chapterLabels[chapterIndex];
                chapterLabelEl.style.opacity = '0';
                requestAnimationFrame(() => {
                    chapterLabelEl.style.transition = 'opacity 0.3s ease';
                    chapterLabelEl.style.opacity = '1';
                });
            }

            const heroOpacity = progress < 0.2 ? 1 - progress / 0.2 : 0;
            const heroScale = progress < 0.2 ? 1 - progress * 0.6 : 0.4;
            heroTypo.style.opacity = Math.max(0, heroOpacity);
            heroTypo.style.transform = `translate(-50%, -50%) scale(${Math.max(0.7, heroScale)})`;
            heroTypo.style.filter = `blur(${progress < 0.15 ? 0 : (progress - 0.15) * 20}px)`;

            progressFill.style.height = `${progress * 100}%`;
        }

        const scrollContent = document.getElementById('scroll-content');
        let lenisInstance = null;

        function initLenis() {
            if (typeof Lenis !== 'undefined') {
                lenisInstance = new Lenis({
                    duration: 1.8,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                    smoothWheel: true,
                    wheelMultiplier: 1,
                    touchMultiplier: 1.5,
                    infinite: false,
                });

                lenisInstance.on('scroll', ({ scroll, limit }) => {
                    const progress = limit > 0 ? scroll / limit : 0;
                    onScroll(progress);
                });

                function raf(time) {
                    lenisInstance.raf(time);
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);
            } else {
                window.addEventListener('scroll', () => {
                    const scrollY = window.scrollY;
                    const maxScroll = document.body.scrollHeight - window.innerHeight;
                    const progress = maxScroll > 0 ? scrollY / maxScroll : 0;
                    onScroll(progress);
                }, { passive: true });
                onScroll(0);
            }
        }

        function loadGSAPAndLenis() {
            const gsapScript = document.createElement('script');
            gsapScript.src = 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js';
            gsapScript.onload = () => {
                const stScript = document.createElement('script');
                stScript.src = 'https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js';
                stScript.onload = () => {
                    gsap.registerPlugin(ScrollTrigger);
                    const lenisScript = document.createElement('script');
                    lenisScript.src =
                        'https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js';
                    lenisScript.onload = () => {
                        initLenis();
                    };
                    lenisScript.onerror = () => initLenis();
                    document.head.appendChild(lenisScript);
                };
                stScript.onerror = () => initLenis();
                document.head.appendChild(stScript);
            };
            gsapScript.onerror = () => initLenis();
            document.head.appendChild(gsapScript);
        }
        loadGSAPAndLenis();
        onScroll(0);

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1);
            const elapsed = time * 0.001;

            mouse.tx += (mouse.x - mouse.tx) * 0.04;
            mouse.ty += (mouse.y - mouse.ty) * 0.04;

            const parallaxX = mouse.tx * 0.6;
            const parallaxY = mouse.ty * 0.35;
            camProxy.x += parallaxX * 0.15;
            camProxy.y += parallaxY * 0.1;

            updateCameraFromProxy();
            camProxy.x -= parallaxX * 0.15;
            camProxy.y -= parallaxY * 0.1;

            if (carGroup && carGroup.children.length > 0) {
                const subtleBob = Math.sin(elapsed * 0.7) * 0.015;
                carGroup.position.y = subtleBob;
            }

            if (particles) {
                particles.rotation.y += dt * 0.03;
                particles.rotation.x += dt * 0.015;
                const posArr = particles.geometry.attributes.position.array;
                for (let i = 0; i < posArr.length; i += 3) {
                    posArr[i + 1] += Math.sin(elapsed * 1.5 + i) * dt * 0.08;
                    if (posArr[i + 1] > 15) posArr[i + 1] = 0.2;
                    if (posArr[i + 1] < 0.1) posArr[i + 1] = 0.2;
                }
                particles.geometry.attributes.position.needsUpdate = true;
            }

            if (scene.fog) {
                const fogShift = 0.000018 + Math.sin(elapsed * 0.3) * 0.000004;
                scene.fog.density = fogShift;
            }

            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate);

        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (touch) {
                mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            }
        }, { passive: true });

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });

        const styleEl = document.createElement('style');
        styleEl.textContent = `
        @keyframes softPulse {
            0%,100% { opacity:0.7; }
            50% { opacity:1; }
        }
        #fixed-ui .top-left {
            animation: softPulse 3s ease-in-out infinite;
        }
        @keyframes horizonGlowPulse {
            0%,100% { box-shadow: 0 0 60px rgba(255,140,60,0.3), 0 0 120px rgba(200,60,180,0.2); }
            50% { box-shadow: 0 0 80px rgba(255,160,70,0.45), 0 0 150px rgba(220,80,200,0.3); }
        }
    `;
        document.head.appendChild(styleEl);

        console.log('%c🏁 TEAMBKIT %c— Race To Be The Star %c🏁',
            'font-size:1.5em;font-weight:bold;color:#ff9966;',
            'font-size:1em;color:#ffccaa;font-style:italic;',
            'font-size:1.5em;');
        console.log('%cStock outside. Faster inside.%c Cinematic experience ready.',
            'color:#ff8855;', 'color:#aaa;');
        console.log('%cScroll to explore • Made for screenshots • @teambkit.official',
            'color:#888;font-size:0.8em;');
    </script>
</body>
